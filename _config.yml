title: "Santiago Bolívar — Portfolio"
description: "Technical Writer ↗ AI Product | Portfolio & Projects"
url: "https://santiagobolivar.dev"
baseurl: ""

theme: null  # we're using custom layouts/styles

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: /:categories/:title/

collections:
  projects:
    output: true
    permalink: /projects/:name/
  services:
    output: true
    permalink: /services/:name/
  experience:
    output: true
    permalink: /experience/:name/

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "services"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "experience"
    values:
      layout: "default"

# Build options
markdown: kramdown
kramdown:
  input: GFM
exclude:
  - README.md
  - node_modules
  - .github
  - Gemfile.lock

# Dark theme tokens
dark_theme:
  background: "#0b0f14"
  surface:    "#12171e"
  text:       "#e6e9ef"
  text-dim:   "#b0b8c3"
  border:     "#1e2630"
  accent:     "#7dd3fc"
